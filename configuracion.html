<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Configuración | AulaX</title>

<link rel="stylesheet" href="style.css">

<style>

.profile-card{

background:white;

padding:30px;

border-radius:20px;

box-shadow:0 10px 20px rgba(0,0,0,.08);

max-width:900px;

margin:auto;

}

.profile-header{

text-align:center;

margin-bottom:30px;

}

.profile-header img{

width:130px;

height:130px;

border-radius:50%;

border:5px solid #2563eb;

margin-bottom:15px;

}

.form-group{

margin-bottom:20px;

}

.form-group label{

display:block;

margin-bottom:8px;

font-weight:bold;

}

.form-group input{

width:100%;

padding:12px;

border:1px solid #ccc;

border-radius:10px;

font-size:15px;

}

.options{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:20px;

margin-top:30px;

}

.option{

background:#f5f7fb;

padding:20px;

border-radius:15px;

}

.save{

margin-top:30px;

background:#2563eb;

color:white;

padding:15px 30px;

border:none;

border-radius:10px;

cursor:pointer;

font-size:16px;

}

.save:hover{

background:#1d4ed8;

}

</style>

</head>

<body>

<div class="sidebar">

<h2>AulaX</h2>

<a href="cursos.html">📚 Mis Cursos</a>

<a href="clases.html">🎥 Clases</a>

<a href="calendario.html">📅 Calendario</a>

<a href="configuracion.html">⚙ Configuración</a>

</div>

<div class="main">

<header>

<div>

<h1>⚙ Configuración</h1>

<p>Administra tu cuenta.</p>

</div>

<div class="profile">

<img src="https://i.pravatar.cc/150?img=12">

</div>

</header>

<div class="profile-card">

<div class="profile-header">

<img src="https://i.pravatar.cc/200?img=12">

<h2>Carlos Pérez</h2>

<p>Estudiante de Desarrollo Web</p>

</div>

<div class="form-group">

<label>Nombre Completo</label>

<input type="text" value="Carlos Pérez">

</div>

<div class="form-group">

<label>Correo Electrónico</label>

<input type="email" value="carlos@aulax.com">

</div>

<div class="form-group">

<label>Nueva Contraseña</label>

<input type="password" placeholder="********">

</div>

<div class="options">

<div class="option">

<h3>🌙 Modo Oscuro</h3>

<p>Estado: Próximamente</p>

</div>

<div class="option">

<h3>🔔 Notificaciones</h3>

<p>Activadas</p>

</div>

<div class="option">

<h3>🌐 Idioma</h3>

<p>Español</p>

</div>

<div class="option">

<h3>🎓 Certificados</h3>

<p>3 obtenidos</p>

</div>

</div>

<button class="save" onclick="guardar()">

💾 Guardar Cambios

</button>

</div>

</div>

<script>

function guardar(){

alert("Los cambios se han guardado correctamente.");

}

</script>

</body>

</html>
